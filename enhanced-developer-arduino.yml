---
# Mac Dev Tools Setup Playbook
# Usage: ansible-playbook mac_dev_setup.yml -K
# Requires: ansible installed on the target Mac (pip3 install ansible)
#
# NOTE: Arduino Lab for MicroPython is NOT in Homebrew.
#       It is handled via direct download task at the bottom.
#       SiliconMotion InstantView requires a kernel extension approval
#       in System Settings → Privacy & Security after install.

- name: Mac Developer Environment Setup
  hosts: localhost
  connection: local
  become: false

  vars:
    homebrew_prefix: "{{ '/opt/homebrew' if ansible_machine == 'arm64' else '/usr/local' }}"

  tasks:

    # ── 1. Xcode Command Line Tools ──────────────────────────────────────────
    - name: Check if Xcode CLT is installed
      command: xcode-select -p
      register: xcode_clt
      failed_when: false
      changed_when: false

    - name: Install Xcode Command Line Tools
      command: xcode-select --install
      when: xcode_clt.rc != 0
      register: xcode_install
      failed_when: false

    - name: Wait for Xcode CLT installation to complete
      pause:
        prompt: "If a dialog appeared to install Xcode CLT, complete it then press Enter to continue"
      when: xcode_install is changed

    # ── 2. Homebrew ──────────────────────────────────────────────────────────
    - name: Check if Homebrew is installed
      stat:
        path: "{{ homebrew_prefix }}/bin/brew"
      register: brew_binary

    - name: Install Homebrew
      shell: |
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: not brew_binary.stat.exists
      environment:
        NONINTERACTIVE: "1"

    - name: Add Homebrew to PATH
      lineinfile:
        path: "{{ ansible_env.HOME }}/.zprofile"
        line: 'eval "$({{ homebrew_prefix }}/bin/brew shellenv)"'
        create: true

    - name: Update Homebrew
      homebrew:
        update_homebrew: true

    # ── 3. ZSH ───────────────────────────────────────────────────────────────
    - name: Install zsh via Homebrew (latest version)
      homebrew:
        name: zsh
        state: present

    - name: Get Homebrew zsh path
      command: "{{ homebrew_prefix }}/bin/brew --prefix zsh"
      register: zsh_prefix
      changed_when: false

    - name: Set Homebrew zsh path fact
      set_fact:
        brew_zsh: "{{ zsh_prefix.stdout }}/bin/zsh"

    - name: Add Homebrew zsh to /etc/shells
      lineinfile:
        path: /etc/shells
        line: "{{ brew_zsh }}"
        state: present
      become: true

    - name: Set Homebrew zsh as default shell
      command: "chsh -s {{ brew_zsh }} {{ ansible_env.USER }}"
      when: ansible_env.SHELL != brew_zsh
      become: true

    # ── 3b. Oh My Zsh ────────────────────────────────────────────────────────
    - name: Check if Oh My Zsh is installed
      stat:
        path: "{{ ansible_env.HOME }}/.oh-my-zsh"
      register: ohmyzsh_dir

    - name: Install Oh My Zsh
      shell: >
        sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
        "" --unattended
      environment:
        SHELL: "{{ brew_zsh }}"
      when: not ohmyzsh_dir.stat.exists

    # ── 4. Homebrew Casks ────────────────────────────────────────────────────
    - name: Install Homebrew cask apps
      homebrew_cask:
        name: "{{ item }}"
        state: present
        greedy: false
      loop:
        - firefox             # Mozilla Firefox
        - kiro                # Kiro AI IDE (Amazon)
        - claude              # Anthropic Claude desktop app
        - claude-code         # Claude Code terminal assistant
        - ghostty             # GPU-accelerated terminal
        - 1password           # 1Password password manager
        - bambu-studio        # Bambu Lab 3D slicer (NOTE: "bamboo" → "bambu")
        - arduino-ide         # Arduino IDE 2.x
        - instantview         # SiliconMotion InstantView display driver
        - visual-studio-code  # Visual studio editor
        - zoom
        - home-assistant
      register: cask_results
      failed_when: false  # Continue even if individual casks fail

    - name: Allow temporary passwordless sudo (required for pkg-based casks)
      copy:
        content: "{{ ansible_env.USER }} ALL=(ALL) NOPASSWD:SETENV: ALL\n"
        dest: /etc/sudoers.d/ansible-brew-temp
        mode: '0440'
        validate: 'visudo -cf %s'
      become: true

    - name: Install Microsoft Office
      shell: "{{ homebrew_prefix }}/bin/brew install --cask microsoft-office"
      register: msoffice_result
      changed_when: "'already installed' not in msoffice_result.stdout"
      failed_when: msoffice_result.rc != 0

    - name: Install Docker Desktop
      shell: "{{ homebrew_prefix }}/bin/brew install --cask docker"
      register: docker_result
      changed_when: "'already installed' not in docker_result.stdout"
      failed_when: docker_result.rc != 0

    - name: Remove temporary passwordless sudo rule
      file:
        path: /etc/sudoers.d/ansible-brew-temp
        state: absent
      become: true

    - name: Install Homebrew cli apps
      homebrew:
        name: "{{ item }}"
        state: present
      loop:
        - claude
        - gh
        - nvchad
        - helm
        - kubectl
        - awscli
        - opentofu
      register: brew_results
      failed_when: false  # Continue even if individual casks fail

    - name: Report any failed cask installs
      debug:
        msg: "WARNING: Failed to install {{ item.item }} — {{ item.msg | default('unknown error') }}"
      loop: "{{ cask_results.results }}"
      when: item.failed is defined and item.failed

    # ── 6. Summary ───────────────────────────────────────────────────────────
    - name: Installation complete
      debug:
        msg: |
          ✅ Mac dev environment setup complete!

          Installed via Homebrew cask:
            • Firefox
            • Kiro IDE
            • Microsoft 365 (Office)
            • Claude (desktop)
            • Claude Code
            • Ghostty
            • 1Password
            • Bambu Studio
            • Arduino IDE
            • SiliconMotion InstantView
            • Docker Desktop
            • Visual Studio Code
            • Zoom

          Installed via GitHub release:
            • Arduino Lab for MicroPython

          ⚠️  Post-install actions required:
            1. Restart your terminal or run: eval "$({{ homebrew_prefix }}/bin/brew shellenv)"
            2. SiliconMotion InstantView: approve kernel extension in
               System Settings → Privacy & Security → Allow
            3. 1Password: sign in and enable browser extensions
            4. Kiro: sign in with AWS or social account on first launch
            5. Docker Desktop: launch once manually to complete setup and accept license
